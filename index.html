<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ana Menü</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(120deg, #1e1e2f, #2c2c54);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 80px;
            font-size: 40px;
        }

        p {
            color: #ccc;
        }

        .menu {
            margin-top: 50px;
        }

        a {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            background: #ffcc00;
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
        }

        a:hover {
            background: #ff9900;
            transform: scale(1.1);
        }

        .exit {
            background: red;
            color: white;
        }

        .exit:hover {
            background: darkred;
        }
    </style>
</head>
